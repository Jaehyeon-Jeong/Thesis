# Stage 1 Kaggle environment config skeleton.
# This file defines paths/runtime only. It is not training implementation code.

environment:
  name: kaggle
  run_location: kaggle_notebook
  full_run_target: true

paths:
  project_root: /kaggle/working/stage1_reimage_reproduction
  data_root: /kaggle/input/reimage-monthly-20d/monthly_20d
  output_root: /kaggle/working/stage1_reimage_reproduction/outputs
  checkpoint_root: /kaggle/working/stage1_reimage_reproduction/outputs/checkpoints
  metrics_root: /kaggle/working/stage1_reimage_reproduction/outputs/metrics
  predictions_root: /kaggle/working/stage1_reimage_reproduction/outputs/predictions
  figures_root: /kaggle/working/stage1_reimage_reproduction/outputs/figures
  run_manifest_root: /kaggle/working/stage1_reimage_reproduction/outputs/run_manifests

data:
  dataset_name: reimage-monthly-20d
  monthly20_root: /kaggle/input/reimage-monthly-20d/monthly_20d
  expected_years: [1993, 2019]
  expected_num_image_files: 27
  expected_num_label_files: 27

runtime:
  device: cuda
  fail_if_cuda_unavailable_for_full_run: true
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  mixed_precision: false

run:
  default_run_mode: full_single_seed
  smoke_run_seeds: [42]
  full_single_seed_run_seeds: [42]
  full_paper_style_run_seeds: [42, 43, 44, 45, 46]

split:
  train_val_years: [1993, 2000]
  test_years: [2001, 2019]
  train_ratio: 0.70
  validation_ratio: 0.30
  split_seed: 42
  split_unit: sample
  stratify: false

normalization:
  pixel_scale: 255.0
  fit_on: train
  scope: per_horizon
  epsilon: 1.0e-8

model:
  name: stock_cnn_i20
  reference_repo: lich99/Stock_CNN
  reference_commit: 415e2acf2a5013afca67e383acd3edc61fced840
  reference_file: models/baseline.py
  input_channels: 1
  input_height: 64
  input_width: 60
  num_classes: 2
  reshape_in_forward: true
  conv_kernel_size: [5, 3]
  conv_stride: [3, 1]
  conv_dilation: [2, 1]
  conv_padding: [12, 1]
  channels: [64, 128, 256]
  pool_kernel_size: [2, 1]
  pool_stride: [2, 1]
  leaky_relu_negative_slope: 0.01
  dropout: 0.5
  flatten_dim: 46080
  expected_parameter_count: 708866
  output_type: logits
  gradcam_target_layers:
    - layer1_conv
    - layer2_conv
    - layer3_conv

reproducibility:
  require_run_manifest: true
  record_kaggle_dataset_version: true
  record_kaggle_notebook_version: true
  record_package_versions: true
