# Stage 1 local environment config skeleton.
# Local execution is for smoke tests only unless explicitly marked otherwise.

environment:
  name: local
  run_location: local_machine
  full_run_target: false

paths:
  project_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction
  data_root: /Users/jaehyeonjeong/Desktop/논문/테스트/Test/img_data/monthly_20d
  output_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs
  checkpoint_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs/checkpoints
  metrics_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs/metrics
  predictions_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs/predictions
  figures_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs/figures
  run_manifest_root: /Users/jaehyeonjeong/Desktop/논문/stage1_reimage_reproduction/outputs/run_manifests

data:
  dataset_name: local_monthly_20d
  monthly20_root: /Users/jaehyeonjeong/Desktop/논문/테스트/Test/img_data/monthly_20d
  expected_years: [1993, 2019]
  expected_num_image_files: 27
  expected_num_label_files: 27

runtime:
  device: auto
  fail_if_cuda_unavailable_for_full_run: false
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  mixed_precision: false

run:
  default_run_mode: smoke
  smoke_run_seeds: [42]
  full_single_seed_run_seeds: [42]
  full_paper_style_run_seeds: [42, 43, 44, 45, 46]

split:
  train_val_years: [1993, 2000]
  test_years: [2001, 2019]
  train_ratio: 0.70
  validation_ratio: 0.30
  split_seed: 42
  split_unit: sample
  stratify: false

normalization:
  pixel_scale: 255.0
  fit_on: train
  scope: per_horizon
  epsilon: 1.0e-8

model:
  name: stock_cnn_i20
  reference_repo: lich99/Stock_CNN
  reference_commit: 415e2acf2a5013afca67e383acd3edc61fced840
  reference_file: models/baseline.py
  input_channels: 1
  input_height: 64
  input_width: 60
  num_classes: 2
  reshape_in_forward: true
  conv_kernel_size: [5, 3]
  conv_stride: [3, 1]
  conv_dilation: [2, 1]
  conv_padding: [12, 1]
  channels: [64, 128, 256]
  pool_kernel_size: [2, 1]
  pool_stride: [2, 1]
  leaky_relu_negative_slope: 0.01
  dropout: 0.5
  flatten_dim: 46080
  expected_parameter_count: 708866
  output_type: logits
  gradcam_target_layers:
    - layer1_conv
    - layer2_conv
    - layer3_conv

training:
  run_mode: smoke
  report_as_reproduction: false
  batch_size: 128
  max_epochs: 100
  loss: cross_entropy
  class_weight: null
  optimizer:
    name: adam
    learning_rate: 1.0e-5
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0
  initialization:
    name: xavier_uniform
    conv_linear_bias: zero
    batchnorm_weight: one
    batchnorm_bias: zero
  early_stopping:
    monitor: val_loss
    mode: min
    patience: 2
    min_delta: 0.0
    restore_best: true
  dataloader:
    train_shuffle: true
    eval_shuffle: false
    drop_last: false
  determinism:
    enabled: true
    cudnn_deterministic: true
    cudnn_benchmark: false
  mixed_precision: false
  gradient_clipping: null
  log_every_batches: 100

evaluation:
  threshold: 0.5
  tie_break_class: 1
  probability_source: softmax_logits
  average_probabilities_across_seeds: true
  batch_size: 128
  min_correlation_group_size: 3
  metrics:
    classification:
      - accuracy
      - majority_class_accuracy
      - precision
      - recall
      - f1
      - roc_auc
      - average_precision
      - brier_score
      - log_loss
      - confusion_matrix
    correlation:
      - pearson_prob_return
      - spearman_prob_return
      - datewise_pearson_prob_return
      - datewise_spearman_prob_return
  prediction_output:
    save_logits: true
    save_probabilities: true
    save_correctness: true

reproducibility:
  require_run_manifest: true
  record_kaggle_dataset_version: false
  record_kaggle_notebook_version: false
  record_package_versions: true
